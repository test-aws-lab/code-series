version: 0.2

phases:
  install:
    runtime-versions:
      golang: 1.22
  build:
    commands:
      - echo "Building Go binary..."
      - cd src
      - go build -o my-app main.go
      - cd .. # ★一度ルートに戻る
  post_build:
    commands:
      - echo "Build finished."

artifacts:
  name: sample.zip
  # zipコマンドを使わずに、生のファイルをそのまま指定してCodeBuildにまとめさせる
  files:
    - appspec.yml
    - src/my-app
    - src/script/**/*