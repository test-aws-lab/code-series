version: 0.2

phases:
  install:
    runtime-versions:
      golang: 1.22
  build:
    commands:
      - echo "Building Go binary..."
      - cd src
      - go build -o my-app main.go
      - cd ..
  post_build:
    commands:
      - zip -r sample.zip src
      - echo "Build finished."

artifacts:
  type: zip
  files:
    - '**/*'
  name: sample.zip